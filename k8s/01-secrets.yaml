# ── Secrets ──────────────────────────────────────────────────────────────────
# NOTE: In production use an external secrets manager (Vault, AWS SSM, etc.)
# and replace stringData with externally injected data.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: crypto-accounting
type: Opaque
stringData:
  POSTGRES_PASSWORD: "password"
  POSTGRES_USER: "postgres"
  ledger-db-url: "postgres://postgres:password@postgres:5432/ledger_db"
  pnl-db-url: "postgres://postgres:password@postgres:5432/pnl_db"
